name: Laravel CD

# on:
#   workflow_run:
#     workflows: ["Laravel CI"]
#     types:
#       - completed

on:
  push:
    branches: [ "main"]

jobs:
  deploy:
    # 🔒 Only run if CI succeeded
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Create ZIP of project
      - name: Create deployment package
        run: |
          zip -r mysticake.zip . -x "vendor/*" ".git/*" ".github/*"

      # 2. Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      # 3. Upload ZIP to VM
      - name: Upload ZIP to VM
        run: |
          scp mysticake.zip ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/mysticake.zip

      # 4. Execute deployment on VM
      - name: Deploy on VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'

          set -e

          echo "👤 Current user: $(whoami)"
          echo "🔍 Sudo test:"
          sudo -n -l 2>&1 || echo "⚠️  Sudo check failed - sudoers may not be configured correctly"

          APP_DIR="/var/www"
          CURRENT="running-mysticake"
          OLD="old-mysticake"
          ARCHIVE="$APP_DIR/archive"
          ZIP_FILE="/tmp/mysticake.zip"
          NEW_DIR="$APP_DIR/new-mysticake"

          sudo mkdir -p $ARCHIVE

          echo "📦 Backing up current running version..."

          if [ -d "$APP_DIR/$CURRENT" ]; then
            sudo -n rm -rf $APP_DIR/$OLD
            sudo -n mv $APP_DIR/$CURRENT $APP_DIR/$OLD
          fi

          echo "📂 Extracting new version..."
          rm -rf $NEW_DIR
          mkdir -p $NEW_DIR
          unzip -o $ZIP_FILE -d $NEW_DIR

          echo "🔁 Switching deployment..."
          sudo -n mv $NEW_DIR $APP_DIR/$CURRENT

          echo "🔑 Copying .env..."
          sudo -n cp $APP_DIR/.env $APP_DIR/$CURRENT/.env

          echo "🧹 Archiving old version..."
          if [ -d "$APP_DIR/$OLD" ]; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            sudo -n tar -czf $ARCHIVE/mysticake_$TIMESTAMP.tar.gz -C $APP_DIR old-mysticake
            sudo -n rm -rf $APP_DIR/$OLD
          fi

          echo "⚙️ Installing dependencies & optimizing Laravel..."
          cd $APP_DIR/$CURRENT
          composer install --no-dev --optimize-autoloader

          echo "🔐 Setting permissions..."
          sudo -n chown -R www-data:www-data /var/www/running-mysticake
          sudo -n chmod -R 775 /var/www/running-mysticake/storage
          sudo -n chmod -R 775 /var/www/running-mysticake/bootstrap/cache

          cd /var/www/running-mysticake
          php artisan optimize:clear
          php artisan key:generate

          echo "🔄 Restarting services..."
          sudo -n systemctl restart php8.2-fpm
          sudo -n systemctl restart nginx

          echo "✅ Deployment completed!"
          EOF